<div class="player-card card_legend" data-elite="{% if joueur.duel > 40 %}true{% endif %}"
    style="--power: {{ joueur.duel }}; --goals: {{ joueur.goal }};">

    <video class="card-bg" autoplay muted loop playsinline>
        <source src="/static/videos/legend.mp4" type="video/mp4">
    </video>

    <div class="holo"></div>

    <div class="card-avatar">
        <img src="{{ joueur.photo }}">
    </div>

    <div class="card-stats">
        <span>Duel: {{ joueur.duel }}</span>
        <span>Goals: {{ joueur.goal }}</span>
        <span>Matchs: {{ joueur.matches }}</span>
    </div>

</div>
<style>
    .players-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, 220px);
        gap: 20px;
        justify-content: center;
    }

    .player-card {
        position: relative;
        width: 286px;
        height: 286px;
        border-radius: 12px;
        overflow: hidden;
        color: black;
        text-align: center;
        box-shadow:
            0 0 calc(10px + (40px * var(--power-normalized))) var(--color);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        --power-normalized: min(calc(var(--power) / 50), 1);
        --color: hsl(calc(var(--goals) * 10), 100%, 50%);
    }

    .holo {
        position: absolute;
        top: -100%;
        left: -100%;
        width: 300%;
        height: 300%;
        background: linear-gradient(120deg,
                transparent 45%,
                var(--color),
                transparent 55%);
        z-index: 2;
        pointer-events: none;
        animation: holoMove calc(4s - (2s * var(--power-normalized))) linear infinite;
    }

    .card_legend .holo {
        animation: holoMove 3s ease-in-out infinite;
    }

    .player-card[data-elite="true"] {
        animation: glowLegend 2s infinite;
    }

    @keyframes holoMove {
        0% {
            transform: translateX(-150%) rotate(15deg);
            opacity: 0;
        }

        10% {
            opacity: 1;
        }

        40% {
            transform: translateX(150%) rotate(15deg);
            opacity: 1;
        }

        50% {
            opacity: 0;
        }

        100% {
            transform: translateX(150%) rotate(15deg);
            opacity: 0;
        }
    }

    .holo {
        animation: holoMove 4s ease-in-out infinite;
    }

    .player-card h3 {
        color: #8b6f17;
    }

    /* ANCHOR vidéo ou image de fond */
    /* LEGEND */
    .card_legend .card-bg {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
        border-radius: 12px;
    }

    .card_legend .card-header {
        position: relative;
        z-index: 1;
        margin-top: 60px;
    }

    .card-avatar {
        position: relative;
        z-index: 1;
        margin: 20px auto;
        width: 180px;
        border-radius: 50%;
        overflow: hidden;
    }

    .card-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        margin-bottom: 5px;
    }

    .card-stats {
        display: flex;
        flex-direction: column;
        position: relative;
        z-index: 1;
        font-size: 1em;
        margin-top: 15px;
        color: #8b6f17;
    }

    .card-avatar,
    .card-stats {
        position: relative;
        z-index: 3;
    }

    .title.legend {
        margin: 0 auto;
        border-radius: 5px;
        padding: 5px 80px;
        background: rgba(255, 215, 0, 0.8);
        font-weight: bold;
        z-index: 2;
        animation: glow 1.5s infinite alternate;
    }

    @keyframes glow {
        from {
            box-shadow: 0 0 5px gold;
        }

        to {
            box-shadow: 0 0 20px gold;
        }
    }
</style>
