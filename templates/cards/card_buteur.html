<div class="player-card card_buteur">
    <video class="card-bg" autoplay muted loop playsinline>
        <source src="/static/videos/buteur.mp4" type="video/mp4">
    </video>
    <div class="storm"></div>

    <div class="card-avatar">
        <img src="{{ joueur.photo }}">
    </div>

    <div class="card-stats">
        <span>Duel : {{ joueur.duel }}</span>
        <span>Goals : {{ joueur.goal }}</span>
        <span>Matchs : {{ joueur.matches }}</span>
    </div>

</div>

<style>
    .card_buteur .card-bg {
        position: absolute;
        top: -35px;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 118%;
        object-fit: cover;
        z-index: 0;
        border-radius: 12px;
    }

    .card_buteur .card-header {
        position: relative;
        z-index: 1;
        margin-top: 86px;
    }

    .card_buteur {
        position: relative;
        z-index: 1;

        animation: electricGlow 2s infinite alternate;
    }

    @keyframes electricGlow {
        0% {
            box-shadow:
                0 0 5px rgba(0, 150, 255, 0.5),
                0 0 10px rgba(0, 150, 255, 0.5),
                0 0 20px rgba(0, 150, 255, 0.5);
        }

        50% {
            box-shadow:
                0 0 10px rgba(0, 200, 255, 0.8),
                0 0 20px rgba(0, 200, 255, 0.8),
                0 0 40px rgba(0, 200, 255, 0.8);
        }

        100% {
            box-shadow:
                0 0 5px rgba(150, 0, 255, 0.6),
                0 0 15px rgba(150, 0, 255, 0.6),
                0 0 30px rgba(150, 0, 255, 0.6);
        }
    }

    .card_buteur::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 12px;
        pointer-events: none;

        background: white;
        opacity: 0;

        animation: lightningFlash 3s infinite;
    }

        0%,

        }

            opacity: 0;
        }

        98% {
            opacity: 0.6;
