<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        /* background: #000000; */
        background-image: url("/static/img/background/background-3.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        margin: 0;
        padding: 0;
        font-family: 'Arial', sans-serif;
    }
    .block {
        position: absolute;
        margin: 10% auto 0;
      top: 0;
    left: 32px;
    width: 294px;
    height: 372px;
    border-radius: 28px;
        background: linear-gradient(0deg, #282626, #1f1e1e);
    }

    .glow::before, .glow::after {
      content: '';
    position: absolute;
    top: 10px;
    left: -1px;
    right: -1px;
    bottom: -1px;
    border-radius: 36px;
    background: linear-gradient(90deg, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8);
    background-size: 400%;
    width: calc(100% + 2px);
    height: calc(100% + -4px);
    animation: glow 20s linear infinite;
    filter: blur(2px);
    z-index: -1000;
    }
    .glow::after {
        animation: glow 2s linear infinite;
    }
    @keyframes glow {
        0% {
            background-position: 0% 50%;
        }
        100% {
            background-position: 100% 50%;
        } 
    }
</style>
<body>
<div class="block glow"></div>
</body>

</html>
